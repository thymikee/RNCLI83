name: iOS Build

on:
  push:
  workflow_dispatch:
    inputs:
      ios_scheme:
        description: iOS Xcode scheme
        required: true
        default: RNCLI83
        type: string
      ios_configuration:
        description: iOS configuration
        required: true
        default: Debug
        type: string
      custom_identifier:
        description: Optional custom artifact identifier (e.g. pr-123, nightly)
        required: false
        default: ""
        type: string
      artifact_retention_days:
        description: Artifact retention in days
        required: true
        default: "7"
        type: string

jobs:
  ios:
    name: iOS simulator build
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Install CocoaPods dependencies
        run: |
          set -euo pipefail
          CONFIG_JSON="$(npx react-native config)"
          IOS_SOURCE_DIR="$(printf '%s' "$CONFIG_JSON" | node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync(0,'utf8'));process.stdout.write(j.project?.ios?.sourceDir || 'ios')")"
          cd "$IOS_SOURCE_DIR"
          pod install --repo-update

      - name: Determine iOS config
        id: ios-config
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.ios_configuration }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=Debug" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine iOS scheme
        id: ios-scheme
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.ios_scheme }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=RNCLI83" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine custom artifact identifier
        id: custom-identifier
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.custom_identifier }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine artifact retention
        id: retention
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.artifact_retention_days }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=7" >> "$GITHUB_OUTPUT"
          fi

      - name: Build iOS simulator
        id: build
        uses: ./.github/actions/github-actions-react-native-build-artifacts/ios-build
        with:
          scheme: ${{ steps.ios-scheme.outputs.value }}
          configuration: ${{ steps.ios-config.outputs.value }}
          artifact-prefix: rn-ios-simulator
          custom-identifier: ${{ steps.custom-identifier.outputs.value }}
          artifact-retention-days: ${{ steps.retention.outputs.value }}

      - name: Publish artifact metadata
        run: |
          {
            echo "## iOS Build Artifact"
            echo ""
            echo "- iOS simulator (.app.tar.gz): name=${{ steps.build.outputs.artifact-name }}, id=${{ steps.build.outputs.artifact-id }}"
            echo ""
            echo "Artifact URL (auth required):"
            echo "- iOS: ${{ steps.build.outputs.artifact-url }}"
          } >> "$GITHUB_STEP_SUMMARY"
