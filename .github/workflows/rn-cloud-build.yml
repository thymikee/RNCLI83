name: RN Cloud Build

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      ios_scheme:
        description: iOS Xcode scheme
        required: true
        default: RNCLI83
        type: string
      ios_configuration:
        description: iOS configuration
        required: true
        default: Debug
        type: string
      android_variant:
        description: Android Gradle variant
        required: true
        default: Debug
        type: string
      custom_identifier:
        description: Optional custom artifact identifier (e.g. pr-123, nightly)
        required: false
        default: ""
        type: string
      artifact_retention_days:
        description: Artifact retention in days
        required: true
        default: "7"
        type: string

jobs:
  ios:
    name: iOS simulator build
    runs-on: macos-latest
    timeout-minutes: 45
    outputs:
      artifact_name: ${{ steps.build.outputs.artifact-name }}
      artifact_id: ${{ steps.build.outputs.artifact-id }}
      artifact_url: ${{ steps.build.outputs.artifact-url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Install CocoaPods dependencies
        run: |
          set -euo pipefail
          CONFIG_JSON="$(npx react-native config)"
          IOS_SOURCE_DIR="$(printf '%s' "$CONFIG_JSON" | node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync(0,'utf8'));process.stdout.write(j.project?.ios?.sourceDir || 'ios')")"
          cd "$IOS_SOURCE_DIR"
          pod install --repo-update

      - name: Determine iOS config
        id: ios-config
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.ios_configuration }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=Debug" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine iOS scheme
        id: ios-scheme
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.ios_scheme }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=RNCLI83" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine custom artifact identifier
        id: custom-identifier
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.custom_identifier }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine artifact retention
        id: retention
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.artifact_retention_days }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=7" >> "$GITHUB_OUTPUT"
          fi

      - name: Build iOS simulator
        id: build
        uses: ./.github/actions/rn-ios-build
        with:
          scheme: ${{ steps.ios-scheme.outputs.value }}
          configuration: ${{ steps.ios-config.outputs.value }}
          artifact-prefix: rn-ios-simulator
          custom-identifier: ${{ steps.custom-identifier.outputs.value }}
          artifact-retention-days: ${{ steps.retention.outputs.value }}

  android:
    name: Android emulator build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      artifact_name: ${{ steps.build.outputs.artifact-name }}
      artifact_id: ${{ steps.build.outputs.artifact-id }}
      artifact_url: ${{ steps.build.outputs.artifact-url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Determine Android variant
        id: android-variant
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.android_variant }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=Debug" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine custom artifact identifier
        id: custom-identifier
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.custom_identifier }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine artifact retention
        id: retention
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.artifact_retention_days }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=7" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Android emulator APK
        id: build
        uses: ./.github/actions/rn-android-build
        with:
          variant: ${{ steps.android-variant.outputs.value }}
          artifact-prefix: rn-android-emulator
          custom-identifier: ${{ steps.custom-identifier.outputs.value }}
          artifact-retention-days: ${{ steps.retention.outputs.value }}

  summary:
    name: Build summary
    runs-on: ubuntu-latest
    needs: [ios, android]
    if: always()
    steps:
      - name: Publish artifact metadata
        run: |
          {
            echo "## RN Cloud Build Artifacts"
            echo ""
            echo "- iOS simulator (.app.tar.gz): name=${{ needs.ios.outputs.artifact_name }}, id=${{ needs.ios.outputs.artifact_id }}"
            echo "- Android emulator (.apk): name=${{ needs.android.outputs.artifact_name }}, id=${{ needs.android.outputs.artifact_id }}"
            echo ""
            echo "Artifact URLs (auth required):"
            echo "- iOS: ${{ needs.ios.outputs.artifact_url }}"
            echo "- Android: ${{ needs.android.outputs.artifact_url }}"
          } >> "$GITHUB_STEP_SUMMARY"
